<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kích Hoạt Thành Công - FC Mobile</title>
    <style>
    .admin-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 25px;
            background: rgba(0, 136, 255, 0.1);
            color: #0088ff;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #0088ff;
            border-radius: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-btn:hover {
            background: #0088ff;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.4);
            transform: translateY(-2px);
        }
    
        :root {
            --gold: #ffcc00;
            --success: #00ff88;
            --bg: #050508;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Hiệu ứng tia sáng tỏa ra phía sau */
        .sun-burst {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            z-index: 1; animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .success-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 40px; padding: 50px 30px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        .check-anim {
            width: 80px; height: 80px;
            background: var(--success);
            border-radius: 50%; margin: 0 auto 30px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 30px var(--success);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: var(--success); font-size: 24px; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .status-msg {
            font-size: 15px; color: #ccc; line-height: 1.6;
            margin-bottom: 30px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px; border-radius: 20px;
            font-size: 13px; color: var(--gold);
            border: 1px dashed rgba(255, 204, 0, 0.3);
        }

        .btn-back {
            display: inline-block; margin-top: 30px;
            color: #888; text-decoration: none;
            font-size: 13px; border-bottom: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="sun-burst"></div>

    <div class="success-card">
        <div class="check-anim">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h1>KÍCH HOẠT THÀNH CÔNG</h1>
        
        <p class="status-msg">
            Gói <b>BUFF TỶ LỆ VIP</b> đã được đồng bộ hóa thành công vào tài khoản của bạn.
        </p>

        <div class="info-box">
            <div style="margin-bottom: 8px;">⚡ Hệ thống...</div>
            <div style="color: #fff; font-size: 12px; opacity: 0.8;">
                Buff Đã Hoạt Vào Game Và Test Ngay.
            </div>
        </div>

        <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); pt: 20px;">
            <p style="font-size: 12px; color: #777; margin-bottom: 10px;">Nếu Buff không hoạt động hoặc gặp lỗi:</p>
            <a href="https://t.me/Jetjet20000" target="_blank" class="admin-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 8px; vertical-align: middle;">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                </svg>
                LIÊN HỆ ADMIN HỖ TRỢ
            </a>
        </div>

        <a href="#" onclick="window.close()" class="btn-back">ĐÓNG TRANG NÀY</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Bắn pháo hoa ngay khi trang web vừa load xong
        window.onload = () => {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00ff88', '#00f2ff', '#ffffff']
            });
        };
    </script>
</body>
</html>
