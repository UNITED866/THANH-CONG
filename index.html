<body>
  <meta charset="UTF-8">


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sunwin PRO MAX</title>
<style>
:root {
  --neon-cyan: #00ffff;
  --neon-magenta: #ff00ff;
  --neon-green: #00ff00;
  --dark-bg: #030a1c;
  --panel-bg: rgba(5, 20, 50, 0.9);
  --border-glow: #0d407f;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--dark-bg);
  overflow: hidden;
  font-family: 'Segoe UI', Roboto, sans-serif;
  color: #fff;
}

iframe {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  border: none;
  z-index: 0; /* 🔥 hạ xuống dưới */
  pointer-events: none; /* 🔥 chặn click khi chưa login */
}

#botWrap {
  position: fixed; top: 80px; left: 20px; z-index: 9999;
  display: flex; align-items: center; gap: 15px;
  touch-action: none; transform-origin: center;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  transform: scale(var(--bot-scale, 1)) rotate(var(--bot-rotation, 0deg));
}

#robot {
  width: 110px; height: auto;
  filter: drop-shadow(0 0 10px var(--neon-cyan));
}

#botPanel {
  min-width: 300px; background: var(--panel-bg);
  backdrop-filter: blur(12px); border: 1px solid var(--border-glow);
  border-top: 3px solid var(--neon-cyan); border-radius: 12px;
  padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

#botHeader { display: flex; justify-content: space-between; margin-bottom: 10px; }
.badge { background: #0d407f; color: var(--neon-cyan); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }

#summaryLine { font-size: 16px; font-weight: 900; margin: 10px 0; text-align: center; color: var(--neon-green); text-transform: uppercase; }
.info-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 13px; color: #cbd5e1; }
.val { font-weight: 800; color: #fff; }

/* LỊCH SỬ PHIÊN CÓ NÚT XÁC NHẬN */
#historyBox {
  margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.3);
  border-radius: 6px; font-size: 11px; border: 1px dashed rgba(0,255,255,0.2);
}
.hist-item { display: flex; flex-direction: column; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.hist-top { display: flex; justify-content: space-between; align-items: center; }
.hist-actions { display: flex; gap: 5px; margin-top: 5px; }

.btn-check {
  padding: 2px 8px; border-radius: 4px; border: 1px solid var(--neon-cyan);
  background: transparent; color: var(--neon-cyan); font-size: 9px; cursor: pointer;
}
.btn-check.win { border-color: var(--neon-green); color: var(--neon-green); }
.btn-check.lose { border-color: var(--neon-magenta); color: var(--neon-magenta); }

#inputArea { margin-top: 10px; display: flex; gap: 5px; }
#sessionInput {
  flex: 1; background: #000; border: 1px solid var(--border-glow);
  color: #fff; border-radius: 5px; padding: 8px; text-align: center; outline: none;
}
#btnAnalyze {
  background: var(--neon-cyan); color: #000; border: none;
  padding: 8px 15px; border-radius: 5px; font-weight: 900; cursor: pointer;
}

.control-group { margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
.btn-rotate {
  width: 100%; background: none; border: 1px solid var(--neon-magenta);
  color: var(--neon-magenta); padding: 6px; border-radius: 5px;
  font-size: 10px; font-weight: 700; cursor: pointer; margin-bottom: 8px;
}
#sizeSlider { width: 100%; height: 4px; accent-color: var(--neon-cyan); }

#statusDot { width: 10px; height: 10px; border-radius: 50%; background: var(--neon-green); }
</style>



<div id="authOverlay" style="position:fixed; inset:0; background:rgba(3,10,28,0.98); z-index:100000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(15px);">
  <div style="background:rgba(5,20,50,0.9); padding:30px; border-radius:15px; border:1px solid #00ffff; width:340px; text-align:center; box-shadow: 0 0 30px rgba(0,255,255,0.2);">
    <h2 style="color:#00ffff; margin-bottom:10px; font-family:sans-serif;">SUN.WIN BY VANHIEP</h2>
    <p style="font-size:12px; color:#cbd5e1; margin-bottom:20px;">Vui lòng nhập Key để tiếp tục</p>
    <input type="text" id="licenseKey" placeholder="Nhập Key Tại Đây" autocomplete="off" spellcheck="false" style="width:100%; padding:12px; background:#000; border:1px solid #0d407f; color:#fff; border-radius:8px; text-align:center; margin-bottom:15px; font-size:16px; outline:none;">

    <button id="authBtn" onclick="validateKey()" style="width:100%; padding:12px; background:#00ffff; color:#000; border:none; border-radius:8px; font-weight:900; cursor:pointer; transition:0.3s;">ĐĂNG NHẬP</button>
    <div id="authStatus" style="margin-top:15px; font-size:11px;"></div>
  </div>
</div>


<div id="botWrap">
  <img id="robot" src="https://i.postimg.cc/63bdy9D9/robotics-1.gif" alt="Robot AI" draggable="false">
  
  <div id="botPanel">
    <div id="botHeader">
      <div class="badge">SUN.WIN BY VANHIEP</div>
      <div id="statusDot"></div>
    </div>

    <div id="summaryLine">SẴN SÀNG</div>

    <div id="botBody">
      <div class="info-row"><span>Dự đoán:</span> <span class="val" id="duDoan">---</span></div>
      <div class="info-row"><span>Tin cậy:</span> <span class="val" id="tyLe">0%</span></div>
      <div class="info-row"><span>Phiên:</span> <span class="val" id="phienHienTai">0</span></div>

      <div id="inputArea">
        <input type="number" id="sessionInput" placeholder="Nhập mã phiên">
        <button id="btnAnalyze" onclick="processAI()">PHÂN TÍCH</button>
      </div>

      <div id="historyBox">
        <div style="color:var(--neon-cyan); margin-bottom:6px; font-weight:bold;">LỊCH SỬ PHIÊN (XÁC NHẬN):</div>
        <div id="histContent">
          <div style="opacity:0.5; font-style:italic">Chờ phiên mới...</div>
        </div>
      </div>

      <div class="control-group">
        <button class="btn-rotate" onclick="rotateTool()">🔄 XOAY TOOL</button>
        <input type="range" id="sizeSlider" min="0.5" max="1.3" step="0.1" value="1">
      </div>
    </div>
  </div>
</div>

<iframe src="https://web.sunwin.af/?affId=Sunwin"></iframe>






    <script>
// Hàm lấy hoặc tạo ID thiết bị cố định
function getFixedDeviceId() {
    let id = localStorage.getItem('device_fingerprint');
    if (!id) {
        id = 'dev-' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('device_fingerprint', id);
    }
    return id;
}

async function validateKey() {
    const key = document.getElementById('licenseKey').value.trim();
    const status = document.getElementById('authStatus');

    const deviceId = getFixedDeviceId();

    const KEYS = {
        "XJSHQOWPZNVBEUQLAKDMSIRP-1H": 60 * 60 * 1000,
        "QOWIEURYTPASDFGHJKLZXCVB-30D": 30 * 24 * 60 * 60 * 1000
    };

    if(KEYS[key]) {

        const now = Date.now();
        const expiry = now + KEYS[key];

        const data = {
            key: key,
            device: deviceId,
            expiry: expiry
        };

        localStorage.setItem('cypher_data', JSON.stringify(data));

        status.innerHTML = `<span style="color:#00ff00">Kích hoạt thành công!</span>`;

        document.querySelector("iframe").style.pointerEvents = "auto";

        setTimeout(() => {
            document.getElementById('authOverlay').style.display = 'none';
        }, 500);

    } else {
        status.innerHTML = `<span style="color:red">Key không hợp lệ!</span>`;
    }
}

(() => {
  const botWrap = document.getElementById('botWrap');
  const botPanel = document.getElementById('botPanel');
  const duDoanEl = document.getElementById('duDoan');
  const tyLeEl = document.getElementById('tyLe');
  const phienEl = document.getElementById('phienHienTai');
  const histContent = document.getElementById('histContent');
  const summaryLine = document.getElementById('summaryLine');
  const sizeSlider = document.getElementById('sizeSlider');
  const badgeEl = document.querySelector('.badge');

  let rotation = 0;
  let historyData = [];

  // 1. THUẬT TOÁN GIẢ LẬP NHỊP CẦU (Tránh so le đơn điệu, tạo bệt ảo)
  function getStrategyResult(phien) {
    const seed = parseInt(phien.toString().slice(-3)) || Math.floor(Math.random() * 1000);
    // Sử dụng thuật toán băm nhỏ để tạo chuỗi kết quả có tính quy luật giả
    const fakeLogic = (seed * 17 + 11) % 10; 
    if (fakeLogic < 4.8) return "TÀI";
    if (fakeLogic < 9.2) return "XỈU";
    return (Math.random() > 0.5) ? "TÀI" : "XỈU";
  }

  // 2. HIỆU ỨNG NHẢY CHỈ SỐ TÍN HIỆU (Tạo cảm giác AI đang quét dữ liệu)
  setInterval(() => {
    const signal = (Math.random() * (0.992 - 0.915) + 0.915).toFixed(3);
    if(badgeEl) badgeEl.textContent = "SUN.WIN BY VANHIEP: " + signal;
  }, 3000);

  // 3. ĐIỀU KHIỂN XOAY & SIZE
  window.rotateTool = () => {
    rotation += 90;
    botWrap.style.setProperty('--bot-rotation', (rotation % 360) + 'deg');
  };

  sizeSlider.addEventListener('input', () => {
    botWrap.style.setProperty('--bot-scale', sizeSlider.value);
  });

  // 4. XỬ LÝ SOI CẦU VỚI HIỆU ỨNG TRÌ HOÃN PHÂN TÍCH
  window.processAI = function() {
    const phien = document.getElementById('sessionInput').value;
    if(!phien) return;

    summaryLine.textContent = "ĐANG PHÂN TÍCH PHIÊN CƯỢC...";
    summaryLine.style.color = "yellow";

    setTimeout(() => {
      const ketQua = getStrategyResult(phien);
      // Tỉ lệ thắng dao động từ 78% đến 96% theo yêu cầu trước đó
      const tyLe = Math.floor(Math.random() * (96 - 78 + 1)) + 78;

      duDoanEl.textContent = ketQua;
      duDoanEl.style.color = (ketQua === "TÀI") ? "var(--neon-cyan)" : "var(--neon-magenta)";
      tyLeEl.textContent = tyLe + "%";
      phienEl.textContent = phien;
      
      summaryLine.textContent = "PHÂN TÍCH HOÀN TẤT";
      summaryLine.style.color = "var(--neon-green)";

      addHistory(phien, ketQua);
      document.getElementById('sessionInput').value = "";
    }, 1500);
  };

  function addHistory(phien, duDoan) {
    const item = { phien, duDoan, status: 'pending' };
    historyData.unshift(item);
    if(historyData.length > 3) historyData.pop();
    renderHistory();
  }

  // 5. XÁC NHẬN KẾT QUẢ & HIỆU ỨNG PHẢN HỒI (AI ĐANG HỌC)
  window.confirmResult = (index, isWin) => {
    const entry = historyData[index];
    entry.status = isWin ? 'WIN' : 'LOSE';
    renderHistory();
    
    if(!isWin) {
      summaryLine.textContent = "ĐANG RESET THUẬT TOÁN...";
      summaryLine.style.color = "var(--neon-magenta)";
      setTimeout(() => {
        summaryLine.textContent = "ĐÃ TỐI ƯU CẦU PHIÊN #" + entry.phien;
        summaryLine.style.color = "var(--neon-green)";
        setTimeout(() => { summaryLine.textContent = "SẴN SÀNG"; }, 1500);
      }, 1500);
    } else {
      summaryLine.textContent = "THUẬT TOÁN CHÍNH XÁC";
      summaryLine.style.color = "var(--neon-green)";
      setTimeout(() => { summaryLine.textContent = "SẴN SÀNG"; }, 1500);
    }
  };

  function renderHistory() {
    histContent.innerHTML = historyData.map((h, i) => `
      <div class="hist-item">
        <div class="hist-top">
          <span>#${h.phien} - Dự đoán: <b style="color:${h.duDoan==='TÀI'?'#00ffff':'#ff00ff'}">${h.duDoan}</b></span>
          ${h.status !== 'pending' ? `<b style="color:${h.status==='WIN'?'#00ff00':'#ff00ff'}">${h.status}</b>` : ''}
        </div>
        ${h.status === 'pending' ? `
          <div class="hist-actions">
            <button class="btn-check win" onclick="confirmResult(${i}, true)">THẮNG</button>
            <button class="btn-check lose" onclick="confirmResult(${i}, false)">THUA</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  // LOGIC DI CHUYỂN TOOL (DRAG)
  let dragging = false, startX, startY, startL, startT;
  botWrap.addEventListener('pointerdown', (e) => {
    if(['INPUT', 'BUTTON'].includes(e.target.tagName)) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startL = botWrap.offsetLeft; startT = botWrap.offsetTop;
    botWrap.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    botWrap.style.left = (startL + (e.clientX - startX)) + 'px';
    botWrap.style.top = (startT + (e.clientY - startY)) + 'px';
  });
  window.addEventListener('pointerup', (e) => {
    dragging = false;
    botWrap.releasePointerCapture(e.pointerId);
  });
})();
let expiryCheckRetry = 0; // Biến đếm số lần lỗi mạng

function startAutoExpiryCheck() {
    setInterval(async () => {

        const savedKey = localStorage.getItem('cypher_key');
        if (!savedKey) return;

        // ✅ CHECK KEY HẾT HẠN
        const data = JSON.parse(localStorage.getItem('cypher_data'));
        if(data) {
            const now = Date.now();
            const deviceId = getFixedDeviceId();

            if(data.device !== deviceId || now >= data.expiry) {
                localStorage.removeItem('cypher_data');
                location.reload();
            }
        }

        const deviceId = getFixedDeviceId();

        try {
            const response = await fetch(`https://auth-cypher-vn.ngtientaimusic.workers.dev/?key=${savedKey}&device=${deviceId}`);
            const result = await response.json();

            if (result.status === "fail") {
                console.log("Key fail nhưng đã bị chặn reload");
            }

        } catch (e) {}

    }, 60000);
}


// Gọi hàm này ngay khi trang web vừa tải xong
window.addEventListener('load', startAutoExpiryCheck);

</script>
