<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANHIEP MOD PRO - ULTIMATE ADMIN</title>
    <style>
        :root {
            --primary: #00f2ff; --secondary: #7000ff; --bg: #050510;
            --card-bg: rgba(20, 20, 35, 0.85); --border: rgba(0, 242, 255, 0.3);
            --round: 20px;
        }
        body {
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #101030 0%, #050510 100%);
        }
        
        #lockScreen { text-align: center; margin-top: 150px; padding: 20px; }
        #lockScreen h1 {
            color: #ff0050; font-size: 28px; text-shadow: 0 0 15px #ff0050;
            text-transform: uppercase; margin-bottom: 30px;
        }
        .lock-input {
            background: #000; border: 1px solid #ff0050; color: #fff;
            padding: 12px; border-radius: 12px; outline: none; width: 200px; text-align: center;
        }

        .container { max-width: 1000px; margin: 0 auto; display: none; }
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: var(--round);
            padding: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); margin-bottom: 25px;
        }
        h1 { text-align: center; font-size: 22px; color: var(--primary); letter-spacing: 4px; text-transform: uppercase; }
        h2 { font-size: 15px; color: #ff0050; border-left: 4px solid #ff0050; padding-left: 10px; margin-bottom: 15px; }

        .control-panel {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.05); padding: 15px;
            border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 10px; outline: none; }
        .btn-gen {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; border: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .table-container { overflow-x: auto; border-radius: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; white-space: nowrap; }
        th { padding: 10px; font-size: 11px; opacity: 0.5; text-align: left; text-transform: uppercase; }
        td { background: rgba(255, 255, 255, 0.04); padding: 12px; font-size: 13px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; border: 1px solid; }
        .bg-active { background: #00ff9622; color: #00ff96; border-color: #00ff96; }
        .bg-waiting { background: #ffffff11; color: #fff; border-color: #fff; }
        .bg-expired { background: #ff005022; color: #ff0050; border-color: #ff0050; }

        .copy-btn { background: var(--primary); color: #000; border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; margin-left: 8px; }
        .btn-plus { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .btn-del-multi { background: #ff0050; color: #fff; border: none; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; display: none; font-weight: bold; }
        
        .add-time-box { display: flex; gap: 4px; margin-top: 5px; }
        .small-input { width: 50px; font-size: 10px; padding: 2px 5px; border-radius: 5px; background: #000; border: 1px solid var(--primary); color: #fff; }
    </style>
</head>
<body onload="checkAccess()">

    <div id="lockScreen">
        <h1>TRUY CẬP HỆ THỐNG</h1>
        <input type="password" id="passInput" class="lock-input" placeholder="Mật mã bí mật...">
        <button onclick="verifyPass()" class="btn-gen" style="margin-top: 15px;">XÁC MINH</button>
    </div>

    <div id="adminContent" class="container">
        <div class="glass-card">
            <h1>VANHIEP MOD MENU</h1>
            <div class="control-panel">
                <input type="number" id="genValue" value="30" style="width: 60px;">
                <select id="genType">
                    <option value="mins">Phút</option>
                    <option value="days">Ngày</option>
                </select>
                <button class="btn-gen" onclick="generateKey()">+ TẠO MÃ</button>
            </div>
            <button id="btnDelMulti" class="btn-del-multi" onclick="deleteSelected()">🗑️ XÓA ĐÃ CHỌN (<span id="countSelect">0</span>)</button>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                            <th>MÃ KEY</th>
                            <th>TRẠNG THÁI</th>
                            <th>HWID</th>
                            <th>HẠN DÙNG</th>
                            <th>HÀNH ĐỘNG</th>
                        </tr>
                    </thead>
                    <tbody id="keyData"></tbody>
                </table>
            </div>
        </div>
        <div class="glass-card" id="expiredSection" style="display: none;">
            <h2>DỰ TRỮ / HẾT HẠN / BỊ KHÓA</h2>
            <div class="table-container">
                <table>
                    <tbody id="expiredKeyData"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    // ✅ THAY LINK SERVEO MỚI CỦA ÔNG VÀO ĐÂY
    const API_URL = "https://51ca65665c82a558-123-17-228-85.serveousercontent.com"; 
    const SECRET_PASSWORD = "vhp";

    // Hàm kiểm tra quyền truy cập khi load trang
    function checkAccess() {
        if (sessionStorage.getItem('isVHP') === 'true') {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadKeys();
            setInterval(loadKeys, 10000); // Tự động load mỗi 10s
        }
    }

    // Hàm xác minh mật khẩu
    function verifyPass() {
        const input = document.getElementById('passInput').value;
        if (input === SECRET_PASSWORD) {
            sessionStorage.setItem('isVHP', 'true');
            location.reload();
        } else { 
            alert("Mật khẩu sai! Vui lòng nhập đúng mật khẩu của VanHiep."); 
        }
    }

    async function loadKeys() {
        const tbody = document.getElementById('keyData');
        const expiredTbody = document.getElementById('expiredKeyData');
        try {
            const res = await fetch(`${API_URL}/admin/list`);
            const keys = await res.json();
            tbody.innerHTML = ''; expiredTbody.innerHTML = '';
            const now = Date.now();
            let hasExp = false;
            
            for (let k in keys) {
                const isExp = now > keys[k].expiry;
                const isBanned = keys[k].banned === true;
                const date = new Date(keys[k].expiry).toLocaleString('vi-VN');
                
                let badge = isBanned ? '<span class="badge" style="color:#ff0050; border-color:#ff0050;">ĐÃ KHÓA</span>' :
                            (isExp ? '<span class="badge bg-expired">HẾT HẠN</span>' :
                            (keys[k].hwid ? '<span class="badge bg-active">ON</span>' : '<span class="badge bg-waiting">CHỜ</span>'));

                const row = `<tr>
                    <td><input type="checkbox" class="key-cb" value="${k}" onclick="updateCount()"></td>
                    <td style="font-weight:bold; color:var(--primary)">${k} <button class="copy-btn" onclick="copyToClipboard('${k}')">COPY</button></td>
                    <td>${badge}</td>
                    <td style="font-family:monospace; font-size:11px;">${keys[k].hwid || 'N/A'}</td>
                    <td>
                        <div style="font-size:11px;">${date}</div>
                        <div class="add-time-box">
                            <input type="number" id="plusVal_${k}" class="small-input" placeholder="Phút">
                            <button class="btn-plus" onclick="addTime('${k}', 1)">+</button>
                            <button class="btn-plus" onclick="addTime('${k}', -1)">-</button>
                            <button class="btn-plus" style="color:#ff0050; border-color:#ff0050;" onclick="toggleBan('${k}', ${!isBanned})">${isBanned ? 'MỞ' : 'KHÓA'}</button>
                        </div>
                    </td>
                    <td><button onclick="deleteSingle('${k}')" style="background:none; border:none; color:#ff0050; cursor:pointer; font-size:18px;">×</button></td>
                </tr>`;

                if (isExp || isBanned) {
                    expiredTbody.innerHTML += row;
                    hasExp = true;
                } else {
                    tbody.innerHTML += row;
                }
            }
            document.getElementById('expiredSection').style.display = hasExp ? 'block' : 'none';
        } catch(e) { console.log("Server Offline"); }
    }

    async function toggleBan(key, status) {
        await fetch(`${API_URL}/admin/toggle-ban?key=${key}&status=${status}`);
        loadKeys();
    }

    async function addTime(key, type) {
        const val = document.getElementById(`plusVal_${key}`).value;
        if(!val) return alert("Nhập số phút!");
        await fetch(`${API_URL}/admin/add-time?key=${key}&mins=${val * type}`);
        loadKeys();
    }

    async function generateKey() {
        const v = document.getElementById('genValue').value;
        const t = document.getElementById('genType').value;
        await fetch(`${API_URL}/gen?${t}=${v}`);
        loadKeys();
    }

    async function deleteSingle(k) {
        if(confirm('Xóa Key này?')) {
            await fetch(`${API_URL}/admin/delete?key=${k}`);
            loadKeys();
        }
    }

    function toggleAll(s) {
        document.querySelectorAll('.key-cb').forEach(cb => cb.checked = s.checked);
        updateCount();
    }

    function updateCount() {
        const sel = document.querySelectorAll('.key-cb:checked').length;
        document.getElementById('btnDelMulti').style.display = sel > 0 ? 'block' : 'none';
        document.getElementById('countSelect').innerText = sel;
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert('Đã copy: ' + text);
    }
</script>
</body>
</html>
